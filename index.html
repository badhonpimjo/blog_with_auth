<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deployment Successful</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        :root {
    --primary: #28a745;
    --primary-hover: #218838;
    --bg: #f4f7f6;
    --card-bg: #ffffff;
    --text: #2c3e50;
    --text-muted: #6c757d;
    --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    --radius: 16px;
}

        
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    background: var(--card-bg);
    padding: 2.5rem;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    text-align: center;
    max-width: 480px;
    width: 100%;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

@keyframes fadeInUp {
    to { opacity: 1; transform: translateY(0); }
}

.success-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 1.5rem;
    background: rgba(40, 167, 69, 0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pulse 2s infinite;
}

.success-icon svg {
    width: 40px;
    height: 40px;
    color: var(--primary);
}

@keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.4); }
    50% { box-shadow: 0 0 0 12px rgba(40, 167, 69, 0); }
}

h1 {
    font-size: 1.8rem;
    margin-bottom: 0.5rem;
    color: var(--primary);
}

#status-message {
    color: var(--text-muted);
    margin-bottom: 0.5rem;
}

#timestamp {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
}

.actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
}

.btn {
    padding: 0.75rem 1.5rem;
    font-size: 0.95rem;
    font-weight: 500;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn-primary {
    background: var(--primary);
    color: #fff;
}

.btn-primary:hover {
    background: var(--primary-hover);
    transform: translateY(-2px);
}

.btn-secondary {
    background: transparent;
    color: var(--primary);
    border: 2px solid var(--primary);
}

.btn-secondary:hover {
    background: rgba(40, 167, 69, 0.08);
    transform: translateY(-2px);
}

.btn:active {
    transform: translateY(0);
}

@media (max-width: 480px) {
    .container { padding: 1.5rem; }
    h1 { font-size: 1.5rem; }
    .actions { flex-direction: column; }
}
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h1>Deployment is  Successful!</h1>
        <p id="status-message">Your application is now live and running.</p>
        <p id="timestamp"></p>
        
        <div class="actions">
            <button id="view-btn" class="btn btn-primary">View Application</button>
            <button id="logs-btn" class="btn btn-secondary">View Logs</button>
        </div>
    </div>

    <script src="./main.js"></script>
</body>
</html>
