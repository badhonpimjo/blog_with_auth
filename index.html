<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deployment Successful</title>
    <link rel="stylesheet" href="./style.css">
    
</head>
<body>
    <div class="container">
        <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h1>Deployment is  Successful!</h1>
        <p id="status-message">Your application is now live and running.</p>
        <p id="timestamp"></p>
        
        <div class="actions">
            <button id="view-btn" class="btn btn-primary">View Application</button>
            <button id="logs-btn" class="btn btn-secondary">View Logs</button>
        </div>
    </div>

    <script src="./main.js"></script>
</body>
</html>
